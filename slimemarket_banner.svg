<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
  <defs>
    <linearGradient id="mktBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140F02" />
      <stop offset="50%" stop-color="#2B1F04" />
      <stop offset="100%" stop-color="#0A0801" />
    </linearGradient>

    <linearGradient id="goldCoins" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="50%" stop-color="#FFA751" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>

    <filter id="mktGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes mktPulse {
      0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7)); }
      50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(255, 167, 81, 1)); }
    }
    @keyframes coinFlow {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }

    .bg-mkt { fill: url(#mktBg); }
    .title-mkt { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 42px; fill: url(#goldCoins); animation: mktPulse 3.5s infinite ease-in-out; }
    .sub-mkt { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; fill: #FFEAA7; letter-spacing: 3px; }
    .wire-mkt { stroke: url(#goldCoins); stroke-width: 2; fill: none; stroke-dasharray: 14 7; animation: coinFlow 14s linear infinite; opacity: 0.5; }
    .badge-mkt { fill: #2E2105; stroke: #FFD700; stroke-width: 1.5; rx: 6px; }
    .btext-mkt { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; fill: #FFD700; }
  </style>

  <rect class="bg-mkt" width="920" height="300" rx="14" stroke="#FFD700" stroke-width="1.5" />
  <path class="wire-mkt" d="M 50,40 H 870 M 50,260 H 870 M 100,0 V 300 M 820,0 V 300 M 50,150 H 870" />

  <g transform="translate(460, 95)">
    <polygon points="0,-42 34,-20 34,20 0,42 -34,20 -34,-20" fill="#2E2105" stroke="url(#goldCoins)" stroke-width="3" filter="url(#mktGlow)" />
    <circle cx="0" cy="0" r="10" fill="#FFD700" />
  </g>

  <text x="460" y="185" text-anchor="middle" class="title-mkt">DRAKES SLIME MARKET</text>
  <text x="460" y="215" text-anchor="middle" class="sub-mkt">AUTOMATED SLIMEFUN ECONOMY &amp; SHOP · RUST ACCELERATED</text>

  <g transform="translate(230, 245)">
    <rect x="0" y="0" width="145" height="30" class="badge-mkt" />
    <text x="12" y="20" class="btext-mkt">DYNAMIC ECONOMY</text>

    <rect x="165" y="0" width="150" height="30" class="badge-mkt" stroke="#FFA751" />
    <text x="177" y="20" class="btext-mkt" fill="#FFA751">RUST FFM HYBRID</text>

    <rect x="335" y="0" width="135" height="30" class="badge-mkt" stroke="#00FF66" />
    <text x="347" y="20" class="btext-mkt" fill="#00FF66">PAPER 1.21.11</text>
  </g>
</svg>
